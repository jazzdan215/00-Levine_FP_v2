<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Let's Learn Chords</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>LET'S LEARN CHORDS</h1>

    <div id="main-content">
        <div class="player">
            <h2>Let's Learn: E7</h2>
            <div class="video-area-wrapper">
                <video controls><source src="E7.mov" type="video/mp4"></video>
            </div>
            <div class="buttons">
                <button class="note-btn" data-freq="329.63">E</button>
                <button class="note-btn" data-freq="415.30">G&sharp;</button>
                <button class="note-btn" data-freq="493.88">B</button>
                <button class="note-btn" data-freq="587.33">D</button>
                <button class="chord-btn" data-notes="[329.63, 415.30, 493.88, 587.33]">Play E7 Chord</button>
                <button class="arp-btn" data-notes="[329.63, 415.30, 493.88, 587.33, 659.26, 830.60]">Arpeggio</button>
            </div>
        </div>

        <div class="player">
            <h2>Let's Learn: B7</h2>
            <div class="video-area-wrapper">
                <video controls><source src="B7.mov" type="video/mp4"></video>
            </div>
            <div class="buttons">
                <button class="note-btn" data-freq="493.88">B</button>
                <button class="note-btn" data-freq="622.25">D&sharp;</button>
                <button class="note-btn" data-freq="739.99">F&sharp;</button>
                <button class="note-btn" data-freq="880">A</button>
                <button class="chord-btn" data-notes="[493.88, 622.25, 739.99, 880]">Play B7 Chord</button>
                <button class="arp-btn" data-notes="[493.88, 622.25, 739.99, 880, 987.76, 1244.50]">Arpeggio</button>
            </div>
        </div>

        <div class="player">
            <h2>Let's Learn: A</h2>
            <div class="video-area-wrapper">
                <video controls><source src="A.mov" type="video/mp4"></video>
            </div>
            <div class="buttons">
                <button class="note-btn" data-freq="440.00">A</button>
                <button class="note-btn" data-freq="554.36">C&sharp;</button>
                <button class="note-btn" data-freq="659.26">E</button>
                <button class="chord-btn" data-notes="[440.00, 554.36, 659.26]">Play A Chord</button>
                <button class="arp-btn" data-notes="[440.00, 554.36, 659.26, 880.00, 1108.72, 1318.52]">Arpeggio</button>
            </div>
        </div>

        <div class="player">
            <h2>Let's Learn: D</h2>
            <div class="video-area-wrapper">
                <video controls><source src="D.mov" type="video/mp4"></video>
            </div>
            <div class="buttons">
                <button class="note-btn" data-freq="293.66">D</button>
                <button class="note-btn" data-freq="369.99">F#</button>
                <button class="note-btn" data-freq="440.00">A</button>
                <button class="chord-btn" data-notes="[293.66, 369.99, 440.00]">Play D Chord</button>
                <button class="arp-btn" data-notes="[293.66, 369.99, 440.00, 587.33, 739.99, 880.00]">Arpeggio</button>
            </div>
        </div>

        <div class="player player-g-wide">
            <h2>Let's Learn: G</h2>
            <div class="video-area-wrapper">
                <div class="g-videos">
                    <div class="g-video-block">
                        <p class="g-part-label">Part I</p>
                        <video controls><source src="Gpart1.mov" type="video/mp4"></video>
                    </div>
                    <div class="g-video-block">
                        <p class="g-part-label">Part II</p>
                        <video controls><source src="Gpart2.mov" type="video/mp4"></video>
                    </div>
                </div>
            </div>
            <div class="buttons">
                <button class="note-btn" data-freq="392.00">G</button>
                <button class="note-btn" data-freq="493.88">B</button>
                <button class="note-btn" data-freq="587.33">D</button>
                <button class="chord-btn" data-notes="[392.00, 493.88, 587.33]">Play G Chord</button>
                <button class="arp-btn" data-notes="[392.00, 493.88, 587.33, 783.99, 987.76, 1174.66]">Arpeggio</button>
            </div>
        </div>
    </div>

    <div class="chromatic-wrapper">
        <h2 class="scale-heading">Chromatic Scale</h2>
        <div class="buttons">
            <button id="octaveShiftBtn" class="octave-toggle" style="background: #18aa01; color: #1f0893; border-radius: 5px; margin-left: 15px;">OCTAVE: OFF</button>
            <button class="note-btn" data-freq="261.63">C</button>
            <button class="note-btn" data-freq="277.18">C#</button>
            <button class="note-btn" data-freq="293.66">D</button>
            <button class="note-btn" data-freq="311.13">D#</button>
            <button class="note-btn" data-freq="329.63">E</button>
            <button class="note-btn" data-freq="349.23">F</button>
            <button class="note-btn" data-freq="369.99">F#</button>
            <button class="note-btn" data-freq="392.00">G</button>
            <button class="note-btn" data-freq="415.30">G#</button>
            <button class="note-btn" data-freq="440.00">A</button>
            <button class="note-btn" data-freq="466.16">A#</button>
            <button class="note-btn" data-freq="493.88">B</button>
            <button class="note-btn" data-freq="523.25">C</button>
            <button id="mathBtn" style="background: #18aa01; color: #1f0893; border-radius: 5px; margin-left: 15px;">LET'S LEARN MATH</button>
            <button id="chaosBtn" class="chaos-flee">ACTIVATE CHAOS</button>
        </div>
    </div>

    <div id="pedalboard">
        <div class="pedal-case">
            <h3>Signal View</h3>
            <canvas id="oscillator-view" width="200" height="80"></canvas>

            <h3>FX Rack</h3>
            <div class="pedal-column">
                <div class="rack-group">
                    <button id="videoFxBtn">Video FX: OFF</button>
                    <label>Master Vol</label>
                    <input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.5">
                </div>

                <div class="rack-group">
                    <button id="wahBtn">Wah-Wah: OFF</button>
                    <label>Mouse Control</label>
                    <p style="font-size: 0.7rem; color: #8b0000;">Move mouse UP/DOWN to sweep</p>
                </div>

                <hr>

                <div class="rack-group">
                    <button id="satBtn">Saturation: OFF</button>
                    <label>Drive</label>
                    <input type="range" id="satDrive" min="0" max="100" value="0">
                </div>

                <div class="rack-group">
                    <button id="fuzzBtn">Fuzz: OFF</button>
                    <label>Intensity</label>
                    <input type="range" id="fuzzRange" min="0" max="1000" value="0">
                </div>

                <div class="rack-group">
                    <button id="tremoloBtn">Tremolo: OFF</button>
                    <label>Speed</label>
                    <input type="range" id="tremoloSpeed" min="0" max="20" step="0.1" value="0.5">
                    <label>Depth</label>
                    <input type="range" id="tremoloDepth" min="0" max="1" step="0.01" value="0.025">
                </div>

                <div class="rack-group">
                    <button id="delayBtn">Delay: OFF</button>
                    <label>Time</label>
                    <input type="range" id="delayTime" min="0" max="2" step="0.01" value="0.025">
                    <label>Feedback</label>
                    <input type="range" id="delayFeedback" min="0" max="0.9" step="0.01" value="0.025">
                    <label>Mix</label>
                    <input type="range" id="delayMix" min="0" max="1" step="0.01" value="0.05">
                </div>

                <div class="rack-group">
                    <button id="filterBtn">AM Radioizer: OFF</button>
                    <label>Freq</label>
                    <input type="range" id="freq" min="100" max="5000" value="500">
                </div>

                <div class="rack-group">
                    <button id="reverbBtn">Reverb: OFF</button>
                    <label>Size</label>
                    <input type="range" id="revSize" min="0.1" max="5" step="0.1" value="0.025">
                    <label>Mix</label>
                    <input type="range" id="revMix" min="0" max="1" step="0.01" value="0.025">
                </div>

                <div class="rack-group">
                    <label>Oscillator Tone</label>
                    <select id="toneSelect" class="tone-dropdown">
                        <option value="sine" selected>Sine (Smooth)</option>
                        <option value="sawtooth">Sawtooth</option>
                        <option value="square">Square (Hollow/Retro)</option>
                        <option value="triangle">Triangle (Warm)</option>
                    </select>
                </div>

                <div class="rack-group" style="border: none;">
                    <button id="elevenBtn" class="spinal-tap-btn">11</button>
                    <p style="font-size: 0.8rem; color: #8b0000; margin: 0; font-family: 'SquealerEmbossed', sans-serif;"></p>
                </div>

                <div class="rack-group">
                    <div id="recording-status" style="display: none; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px;">
                        <img id="rec-light" src="live-recording.gif" width="20" height="20">
                        <span style="color: #ff0000; font-family: 'Liquid Galaxy', sans-serif; font-size: 0.8rem; letter-spacing: 1px;">RECORDING...</span>
                    </div>
                    <button id="recordBtn">Record Session</button>
                    <a id="downloadLink" style="display: none; color: #00f2ff; margin-top: 10px;">Download Recording</a>
                </div>
            </div>
        </div>
    </div>

    <div id="math-takeover" class="math-overlay">
        <button id="close-math" class="exit-btn">EXIT MATH MODE</button>
        <div class="math-video-wrapper">
            <h2 style="color: #ff00ff; font-family: 'Liquify';">CALCULATING CHAOS...</h2>
            <video id="mathVideo" src="mathrock.mov" preload="auto" muted loop></video>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
