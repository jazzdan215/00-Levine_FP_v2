<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Let's Learn Chords</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Let's Learn Chords</h1>


  
  <section class="controls">
    <h3>Master Effects</h3>
   
    <button id="delayBtn">Delay: OFF</button>
    <label>Time: <input type="range" id="delayTime" min="0" max="1" step="0.01" value="0.5"></label>
    <label>Feedback: <input type="range" id="delayFeedback" min="0" max="0.9" step="0.01" value="0.5"></label>
    
        
    <label>Delay Dry/Wet: 
  <input type="range" id="delayMix" min="0" max="1" step="0.01" value="0.5">
</label>

<div></div>

<button id="filterBtn">Filter: OFF</button>
    <label>Filter Freq: <input type="range" id="freq" min="100" max="5000" value="500"> <span id="freq-value">500</span>Hz</label>

<label>Radio Tuning (Bandpass): 
  <input type="range" id="freq" min="200" max="3000" value="1000"> 
  <span id="freq-value">1000</span>Hz
</label>

  <div class="player">
    <h2>Let's Learn: E7</h2>
    <video controls width="400">
      <source src="E7.mov" type="video/mp4">
    </video>

    <div class="buttons">
      <button onclick="playNote(329.63)">E</button>
      <button onclick="playNote(415.30)">G&sharp;</button>
      <button onclick="playNote(493.88)">B</button>
      <button onclick="playNote(587.33)">D</button>
      <button onclick="playChord([329.63, 415.30, 493.88, 587.33])">Play E7 Chord</button>
      <button onclick="playArpeggio([329.63, 415.30, 493.88, 587.33, 329.63 * 2, 415.30 * 2, 493.88 * 2, 587.33 * 2])">Arpeggio</button>
    </div>
  </div>

  <div class="player">
    <h2>Let's Learn: B7</h2>
    <video controls width="400">
      <source src="B7.mov" type="video/mp4">
    </video>

    <div class="buttons">
      <button onclick="playNote(493.88)">B</button>
      <button onclick="playNote(622.25)">D&sharp;</button>
      <button onclick="playNote(739.99)">F&sharp;</button>
      <button onclick="playNote(880)">A</button>
      <button onclick="playChord([493.88, 622.25, 739.99, 880])">Play B7 Chord</button>
      <button onclick="playArpeggio([493.88, 622.25, 739.99, 880, 493.88 * 2, 622.25 * 2, 739.99 * 2, 880 * 2])">Arpeggio</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
