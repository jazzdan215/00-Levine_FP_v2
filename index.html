<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Let's Learn Chords</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>LET'S LEARN CHORDS</h1>

    <div id="main-content">
        <div class="player">
            <h2>Let's Learn: E7</h2>
            <video controls width="400"><source src="E7.mov" type="video/mp4"></video>
            <div class="buttons">
                <button class="note-btn" data-freq="329.63">E</button>
                <button class="note-btn" data-freq="415.30">G&sharp;</button>
                <button class="note-btn" data-freq="493.88">B</button>
                <button class="note-btn" data-freq="587.33">D</button>
                <button class="chord-btn" data-notes="[329.63, 415.30, 493.88, 587.33]">Play E7 Chord</button>
                <button class="arp-btn" data-notes="[329.63, 415.30, 493.88, 587.33, 659.26, 830.60]">Arpeggio</button>
            </div>
        </div>

        <div class="player">
            <h2>Let's Learn: B7</h2>
            <video controls width="400"><source src="B7.mov" type="video/mp4"></video>
            <div class="buttons">
                <button class="note-btn" data-freq="493.88">B</button>
                <button class="note-btn" data-freq="622.25">D&sharp;</button>
                <button class="note-btn" data-freq="739.99">F&sharp;</button>
                <button class="note-btn" data-freq="880">A</button>
                <button class="chord-btn" data-notes="[493.88, 622.25, 739.99, 880]">Play B7 Chord</button>
                <button class="arp-btn" data-notes="[493.88, 622.25, 739.99, 880, 987.76, 1244.50]">Arpeggio</button>
            </div>
        </div>
    </div>

    <div id="pedalboard">
        <div class="pedal-case">
            <h3>Signal View</h3>
            <canvas id="oscillator-view" width="200" height="80"></canvas>

            <h3>FX Rack</h3>
            <div class="pedal-column">
                        
            <div class="rack-group">
            <button id="wahBtn">Wah-Wah: OFF</button>
            <label>Mouse Control</label>
            <p style="font-size: 0.7rem; color: #8b0000;">Move mouse UP/DOWN to sweep</p>
             </div>
                <div class="rack-group">
                    <button id="videoFxBtn">Video FX: OFF</button>
                    <label>Master Vol</label>
                    <input type="range" id="masterVol" min="0" max="1" step="0.01" value="0.5">
                </div>

                <hr>

                <div class="rack-group">
                    <button id="satBtn">Saturation: OFF</button>
                    <label>Drive</label>
                    <input type="range" id="satDrive" min="0" max="100" value="0">
                </div>

                <div class="rack-group">
                    <button id="fuzzBtn">Fuzz: OFF</button>
                    <label>Intensity</label>
                    <input type="range" id="fuzzRange" min="0" max="1000" value="0">
                </div>

                <div class="rack-group">
                    <button id="tremoloBtn">Tremolo: OFF</button>
                    <label>Speed</label>
                    <input type="range" id="tremoloSpeed" min="0" max="20" step="0.1" value="5">
                    <label>Depth</label>
                    <input type="range" id="tremoloDepth" min="0" max="1" step="0.01" value="0">
                </div>

                <div class="rack-group">
                    <button id="delayBtn">Delay: OFF</button>
                    <label>Time</label>
                    <input type="range" id="delayTime" min="0" max="2" step="0.01" value="0">
                    <label>Feedback</label>
                    <input type="range" id="delayFeedback" min="0" max="0.9" step="0.01" value="0">
                    <label>Mix</label>
                    <input type="range" id="delayMix" min="0" max="1" step="0.01" value="0">
                </div>

                <div class="rack-group">
                    <button id="filterBtn">AM Radioizer: OFF</button>
                    <label>Freq</label>
                    <input type="range" id="freq" min="100" max="5000" value="1000">
                </div>

                <div class="rack-group">
                    <button id="reverbBtn">Reverb: OFF</button>
                    <label>Size</label>
                    <input type="range" id="revSize" min="0.1" max="5" step="0.1" value="1.5">
                    <label>Mix</label>
                    <input type="range" id="revMix" min="0" max="1" step="0.01" value="0">
                </div>
                <div class="rack-group" style="border: none;"> <button id="elevenBtn" class="spinal-tap-btn">11</button>
                <p style="font-size: 0.8rem; color: #8b0000; margin: 0; font-family: 'SquealerEmbossed', sans-serif;">These go to eleven.</p>
            </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
